<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- VR headset icon -->
  <g transform="translate(2, 4)">
    <!-- Main visor body -->
    <rect x="2" y="8" width="22" height="13" rx="4" ry="4" fill="url(#grad1)"/>
    <!-- Left strap -->
    <rect x="0" y="11" width="5" height="7" rx="2" ry="2" fill="#4f46e5" opacity="0.9"/>
    <!-- Right strap -->
    <rect x="21" y="11" width="5" height="7" rx="2" ry="2" fill="#4f46e5" opacity="0.9"/>
    <!-- Top band -->
    <rect x="8" y="5" width="10" height="5" rx="2" ry="2" fill="#818cf8" opacity="0.8"/>
    <!-- Left lens glow -->
    <circle cx="8" cy="14.5" r="3.5" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="8" cy="14.5" r="2" fill="#e0e7ff" opacity="0.8"/>
    <!-- Right lens glow -->
    <circle cx="18" cy="14.5" r="3.5" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="18" cy="14.5" r="2" fill="#e0e7ff" opacity="0.8"/>
    <!-- Center bridge -->
    <rect x="11" y="13" width="4" height="3" rx="1" fill="#312e81" opacity="0.7"/>
  </g>

  <!-- Chinese text "灵见" -->
  <text x="34" y="21" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">灵见</text>
  <!-- English text -->
  <text x="34" y="34" font-family="'Arial', sans-serif" font-size="10" font-weight="400" fill="#6366f1" letter-spacing="2">GCLINK</text>

  <!-- Accent dot -->
  <circle cx="118" cy="10" r="3" fill="url(#grad2)" opacity="0.8"/>
</svg>
